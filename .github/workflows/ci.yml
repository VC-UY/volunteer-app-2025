name: CI Volunteer App

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify install package structure
        run: |
          test -f README.md
          test -f installers/linux/install.sh
          test -f installers/windows/install.bat
          test -f volontaire/static/logo.svg
          test -f volontaire/volontaire/templates/home.html
          echo "Package volontaire pret pour telechargement et installation locale"
