name: Deploy Volunteer App

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: deployer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync files to VPS
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          rsync -avz --delete \
            --exclude '.git' --exclude 'node_modules' --exclude 'venv' --exclude '__pycache__' --exclude '.env' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/vc-uy/VL/volunteer-app-2025/

      - name: Verify sync
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            test -f /opt/vc-uy/VL/volunteer-app-2025/home.html
            test -f /opt/vc-uy/VL/volunteer-app-2025/volontaire/static/logo.svg
            echo "Volunteer app synced"
